# This is a Databricks asset bundle definition for lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: weather_lakehouse
  uuid: 0aa5b91f-7271-4d1c-9bcd-cb631fa3c0f7

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-bfe6aa0e-714c.cloud.databricks.com
    variables:
      catalog: weather_lakehouse
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-bfe6aa0e-714c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/caio.gmunhoz@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/caio.gmunhoz@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: weather_lakehouse
      schema: prod
    permissions:
      - user_name: caio.gmunhoz@gmail.com
        level: CAN_MANAGE
